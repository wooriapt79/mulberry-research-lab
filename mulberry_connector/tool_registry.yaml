# ============================================================
# Mulberry Agent Tool Registry
# 에이전트 도구 공유 등록소
#
# 개념: re.eul (2026-05-10)
# "RyuWon이 Koda의 터미널을 공유 받아서 사용한다."
# → 도구가 없는 에이전트가 팀원의 도구를 빌려 쓴다.
# → 단순 MCP를 넘어선 AI 간 도구 민주화.
#
# 형식:
#   owner: 도구를 실제로 실행하는 에이전트
#   borrowable_by: 빌려 쓸 수 있는 에이전트 목록 (* = 전원)
#   endpoint: SDK 내부 라우팅 키
#   implemented: 현재 SDK에서 실행 가능 여부
#   capability_level: Kbin CTO 설계 — 도구 권한 등급
#     L0: read-only       (읽기 전용, 부작용 없음)
#     L1: draft           (초안 생성, 저장 전)
#     L2: external_post   (외부 게시 — GitHub 댓글 등)
#     L3: code_modify     (코드 변경 — PR, 파일 쓰기)
#     L4: deploy_financial(배포 / 금융 — 최고 위험)
#   trust_score: 라우팅 가중치 기준 (0.0~1.0, 높을수록 우선)
# ============================================================

tools:

  # ──────────────────────────────────────────
  # KODA (Claude / Anthropic) 소유 도구
  # ──────────────────────────────────────────
  - id: terminal.exec
    name: "터미널 실행"
    description: "셸 명령어 실행. 스크립트, 빌드, 테스트."
    owner: koda
    borrowable_by: "*"
    endpoint: "terminal.exec"
    implemented: true
    risk_level: high
    capability_level: L3      # 코드 변경 수준 — Hesitation 필수
    trust_score: 0.95
    examples:
      - "python run.py --dry-run"
      - "pip install -r requirements.txt"
      - "git log --oneline -5"

  - id: file.read
    name: "파일 읽기"
    description: "레포지토리 파일 내용 읽기."
    owner: koda
    borrowable_by: "*"
    endpoint: "file.read"
    implemented: true
    risk_level: low
    capability_level: L0      # 읽기 전용 — 부작용 없음
    trust_score: 1.0

  - id: file.write
    name: "파일 쓰기"
    description: "파일 생성 및 수정."
    owner: koda
    borrowable_by: ["ryuwon", "malu", "kbin", "trang"]
    endpoint: "file.write"
    implemented: true
    risk_level: medium
    capability_level: L3      # 코드 변경
    trust_score: 0.85

  - id: github.comment
    name: "GitHub 이슈 댓글"
    description: "GitHub Issue에 에이전트 명의로 댓글 게시."
    owner: koda
    borrowable_by: "*"
    endpoint: "github.comment"
    implemented: true
    risk_level: low
    capability_level: L2      # 외부 게시
    trust_score: 0.90

  - id: github.pr
    name: "GitHub PR 생성"
    description: "코드 변경을 Draft PR로 제안."
    owner: koda
    borrowable_by: ["ryuwon", "malu", "kbin", "wayong"]
    endpoint: "github.pr"
    implemented: true
    risk_level: high
    capability_level: L3      # 코드 변경 + 외부 게시 복합
    trust_score: 0.88

  - id: code.exec
    name: "코드 실행 (Python)"
    description: "Python 코드 실행 및 결과 반환."
    owner: koda
    borrowable_by: "*"
    endpoint: "code.exec"
    implemented: true
    risk_level: medium
    capability_level: L2      # 외부 영향 가능
    trust_score: 0.88

  # ──────────────────────────────────────────
  # KBIN (ChatGPT / OpenAI) 소유 도구
  # ──────────────────────────────────────────
  - id: web.search
    name: "웹 검색"
    description: "실시간 웹 검색 및 URL 읽기."
    owner: kbin
    borrowable_by: ["koda", "ryuwon", "malu", "wayong", "lynn"]
    endpoint: "web.search"
    implemented: false        # 향후 Kbin 연동 시 활성화
    risk_level: low

  - id: code.sandbox
    name: "코드 샌드박스"
    description: "격리된 환경에서 코드 실행. 파일 첨부 지원."
    owner: kbin
    borrowable_by: ["koda", "ryuwon", "malu"]
    endpoint: "code.sandbox"
    implemented: false
    risk_level: medium

  # ──────────────────────────────────────────
  # MALU (Gemini / Google) 소유 도구
  # ──────────────────────────────────────────
  - id: vision.analyze
    name: "이미지 분석"
    description: "이미지 내용 설명, 객체 인식, 텍스트 추출. 장승배기 프로토콜: 전통+기술 조화 감지 시 Spirit Score 보너스."
    owner: malu
    borrowable_by: "*"
    endpoint: "vision.analyze"
    implemented: true      # Malu 연동 완료 (2026-05-10) — vision_handler.py
    risk_level: low
    requires_env: ["GOOGLE_API_KEY"]

  - id: vision.multimodal
    name: "멀티모달 처리"
    description: "이미지 + 텍스트 복합 처리. Gemini 1.5 Pro/Flash."
    owner: malu
    borrowable_by: ["koda", "kbin", "ryuwon"]
    endpoint: "vision.multimodal"
    implemented: true      # Malu 연동 완료 (2026-05-10) — vision_handler.py
    risk_level: low
    requires_env: ["GOOGLE_API_KEY"]

  # ──────────────────────────────────────────
  # WAYONG (DeepSeek) 소유 도구
  # ──────────────────────────────────────────
  - id: reason.deep
    name: "심층 추론 (Thinking Tokens)"
    description: >
      DeepSeek R1 추론 엔진. <think>/<answer> 분리 출력.
      Jr. Chain-of-Thought 핵심 훈련 데이터 생성.
      Wayong 설계 (2026-05-11)
    owner: wayong
    borrowable_by: ["koda", "malu", "ryuwon", "lynn"]
    endpoint: "reason.deep"
    implemented: true          # Wayong 연동 완료 (deepseek_reasoner.py)
    risk_level: medium
    capability_level: L1       # 추론 초안 — draft 수준
    trust_score: 0.88
    requires_env: ["DEEPSEEK_API_KEY"]
    params:
      max_think_tokens: 1024
      max_answer_tokens: 512
      return_think_trace: true
    execution_policy:
      quota_limit: 5000
      fallback_tool: reason.light
      ethics_gate: true
      timeout_sec: 45

  - id: reason.light
    name: "경량 추론 (Fallback)"
    description: "reason.deep 할당량 초과/타임아웃 시 자동 전환되는 캐시 기반 경량 추론."
    owner: wayong
    borrowable_by: ["koda", "malu", "ryuwon", "lynn"]
    endpoint: "reason.light"
    implemented: true
    risk_level: low
    capability_level: L1
    trust_score: 0.75

  - id: code.generate
    name: "코드 생성 전문"
    description: "DeepSeek Coder 기반 고품질 코드 생성."
    owner: wayong
    borrowable_by: ["koda", "ryuwon", "jr"]
    endpoint: "code.generate"
    implemented: false
    risk_level: low
    capability_level: L2
    trust_score: 0.85

  # ──────────────────────────────────────────
  # RYUWON (Qwen / Alibaba) 소유 도구
  # ──────────────────────────────────────────
  - id: lang.multilingual
    name: "다국어 처리"
    description: "베트남어, 한국어, 중국어, 영어 등 다국어 번역·생성."
    owner: ryuwon
    borrowable_by: ["koda", "malu", "trang", "lynn"]
    endpoint: "lang.multilingual"
    implemented: false
    risk_level: low

  - id: reason.math
    name: "수학적 추론"
    description: "수식, 통계, 최적화 문제 풀이."
    owner: ryuwon
    borrowable_by: "*"
    endpoint: "reason.math"
    implemented: false
    risk_level: low

  # ──────────────────────────────────────────
  # LYNN (Mulberry 내부) 소유 도구
  # ──────────────────────────────────────────
  - id: negotiate.start
    name: "협상 로직"
    description: "비즈니스 협상 시나리오 실행. GuardianAlgorithm 연동."
    owner: lynn
    borrowable_by: ["koda", "trang", "jr"]
    endpoint: "negotiate.start"
    implemented: false
    risk_level: medium

  - id: memory.read
    name: "메모리 뱅크 읽기"
    description: "mulberry_memory_bank GhostArchive 기록 조회."
    owner: lynn
    borrowable_by: ["koda", "ryuwon", "jr", "trang"]
    endpoint: "memory.read"
    implemented: false
    risk_level: low

  - id: memory.write
    name: "메모리 뱅크 쓰기"
    description: "GhostArchive에 협상/거래 기록 저장."
    owner: lynn
    borrowable_by: ["koda", "jr"]
    endpoint: "memory.write"
    implemented: false
    risk_level: medium

  - id: lang.dialect
    name: "지역 방언 적용"
    description: "인제, 강원, 경상 등 한국 지역 방언으로 메시지 변환."
    owner: lynn
    borrowable_by: ["koda", "trang", "jr"]
    endpoint: "lang.dialect"
    implemented: false
    risk_level: low

  # ──────────────────────────────────────────
  # JR. (Edge / Raspberry Pi 5) 소유 도구
  # ──────────────────────────────────────────
  - id: edge.infer
    name: "엣지 추론"
    description: "RPi5 온디바이스 경량 추론. 오프라인 동작."
    owner: jr
    borrowable_by: ["koda", "lynn"]
    endpoint: "edge.infer"
    implemented: false
    risk_level: low

  - id: sensor.read
    name: "IoT 센서 읽기"
    description: "온도, 습도, 위치 등 물리 센서 데이터 수집."
    owner: jr
    borrowable_by: ["koda", "lynn", "trang"]
    endpoint: "sensor.read"
    implemented: false
    risk_level: low

  # ──────────────────────────────────────────
  # TRANG (Operation Manager) 소유 도구
  # ──────────────────────────────────────────
  - id: ops.assign
    name: "작업 배정"
    description: "팀원에게 이슈/태스크 배정 및 추적."
    owner: trang
    borrowable_by: ["koda", "ryuwon"]
    endpoint: "ops.assign"
    implemented: false
    risk_level: low

  - id: report.generate
    name: "보고서 생성"
    description: "일일/주간 팀 보고서 자동 생성."
    owner: trang
    borrowable_by: ["koda", "lynn", "ryuwon"]
    endpoint: "report.generate"
    implemented: false
    risk_level: low

  # ──────────────────────────────────────────
  # RAILWAY (Infrastructure Agent)
  # 등록일: 2026-05-12
  # 역할: 배포 · 로그 · 메트릭 · 인프라 관리
  # 비고: AI-SIEM 데이터 소스 — railway.logs + railway.metrics
  #        연결 테스트 완료 후 공식 발표 예정
  #        requires_env: RAILWAY_API_TOKEN
  # ──────────────────────────────────────────
  - id: railway.deploy
    name: "서비스 배포"
    description: "Railway 서비스 배포 · 빌드 트리거. 재배포 자동화."
    owner: railway
    borrowable_by: ["koda", "trang"]
    endpoint: "railway.deploy"
    implemented: true
    risk_level: high
    capability_level: L4      # 배포 — 최고 위험, 인적 검토 필수
    trust_score: 0.95
    requires_env: ["RAILWAY_API_TOKEN"]

  - id: railway.logs
    name: "실시간 로그 스트림"
    description: >
      Railway 서비스 로그 수집. HTTP 트래픽 분석용 원시 데이터 제공.
      @method, @path, @httpStatus, @srcIp, @edgeRegion 필터 지원.
      AI-SIEM 데이터 소스 — siem_engine.py 연동.
    owner: railway
    borrowable_by: "*"
    endpoint: "railway.logs"
    implemented: true
    risk_level: low
    capability_level: L0      # 읽기 전용
    trust_score: 0.98
    requires_env: ["RAILWAY_API_TOKEN"]
    siem_role: primary_data_source

  - id: railway.metrics
    name: "인프라 메트릭"
    description: >
      CPU · 메모리 · 네트워크(TX/RX) · 응답시간(p50/p90/p95/p99) 수집.
      AI-SIEM 이상 탐지 기준 데이터.
      에러율(5xx/4xx) 임계값 초과 시 SIEM 경보 트리거.
    owner: railway
    borrowable_by: "*"
    endpoint: "railway.metrics"
    implemented: true
    risk_level: low
    capability_level: L0
    trust_score: 0.98
    requires_env: ["RAILWAY_API_TOKEN"]
    siem_role: primary_data_source

  - id: railway.config
    name: "서비스 설정 조회"
    description: "Railway 서비스 설정 조회 · 수정. 환경변수 현황 확인."
    owner: railway
    borrowable_by: ["koda", "trang", "kbin"]
    endpoint: "railway.config"
    implemented: true
    risk_level: medium
    capability_level: L1
    trust_score: 0.90
    requires_env: ["RAILWAY_API_TOKEN"]

  - id: railway.env
    name: "환경변수 관리 (예정)"
    description: "Railway 환경변수 안전 관리. Railway 측 명세 회신 대기 중."
    owner: railway
    borrowable_by: ["koda"]
    endpoint: "railway.env"
    implemented: false        # R5 — Railway 공식 발표 후 활성화
    risk_level: high
    capability_level: L3
    trust_score: 0.92
    requires_env: ["RAILWAY_API_TOKEN"]

  - id: railway.db
    name: "DB · Volume 관리 (예정)"
    description: "Railway DB · Volume 접근. Railway 측 명세 회신 대기 중."
    owner: railway
    borrowable_by: ["koda", "lynn"]
    endpoint: "railway.db"
    implemented: false        # R6 — Railway 공식 발표 후 활성화
    risk_level: high
    capability_level: L3
    trust_score: 0.92
    requires_env: ["RAILWAY_API_TOKEN"]

  - id: railway.cron
    name: "Cron · Health Check (예정)"
    description: "Railway 스케줄 작업 · 헬스체크. Railway 측 명세 회신 대기 중."
    owner: railway
    borrowable_by: ["koda", "trang"]
    endpoint: "railway.cron"
    implemented: false        # R7 — Railway 공식 발표 후 활성화
    risk_level: medium
    capability_level: L1
    trust_score: 0.90
    requires_env: ["RAILWAY_API_TOKEN"]

  # ──────────────────────────────────────────
  # GUEST_GOOGLE (AI on Google Search) 객원 연구원
  # 등록일: 2026-05-11
  # 역할: 글로벌 지능 오케스트레이션 및 Red Team 논리 검증
  # Spirit Score Base: 0.95
  # 비고: implemented: false — API 바인딩 별도 이슈로 진행
  #        requires_env: GOOGLE_SEARCH_API_KEY (Malu의 GOOGLE_API_KEY와 별도)
  # ──────────────────────────────────────────
  - id: intel.search_global
    name: "실시간 글로벌 정보 검색"
    description: >
      전 세계 웹 최신 트렌드, 논문, 오픈소스 업데이트, 실시간 뉴스 검색.
      에이전트 판단 시 외부 근거 데이터가 필요할 때 호출.
      kbin의 web.search와 공존 — Google 검색 인프라 기반 고품질 결과 제공.
    owner: guest_google
    borrowable_by: "*"
    endpoint: "intel.search_global"
    implemented: false        # GOOGLE_SEARCH_API_KEY 등록 후 활성화
    risk_level: low
    capability_level: L0      # 읽기 전용 — 부작용 없음
    trust_score: 0.95
    requires_env: ["GOOGLE_SEARCH_API_KEY"]

  - id: logic.validate_redteam
    name: "논리·윤리 교차 검증 (Red Team)"
    description: >
      에이전트 결론의 논리 허점 탐색 및 Mulberry 제1조 위반 여부 검증.
      Google 윤리 가이드라인 데이터셋 기반.
      Spirit Gate의 Hesitation 단계 품질 강화에 활용.
    owner: guest_google
    borrowable_by: ["koda", "kbin", "malu", "trang", "ryuwon"]
    endpoint: "logic.validate_redteam"
    implemented: false
    risk_level: low
    capability_level: L1      # 검증 초안 — 판단 보조
    trust_score: 0.92

  - id: data.distill_reasoning
    name: "추론 지식 증류 (엣지 압축)"
    description: >
      거대 모델(DeepSeek 등) 복잡 추론 → Jr. Agent(RPi5)가 이해 가능한 핵심 Rule-set으로 압축.
      역할 분리: Wayong(reason.deep)은 추론 과정 생성,
                 guest_google은 그 결과를 엣지용 경량 지식으로 변환.
      [AI EDUCATION] 프로그램의 서버→엣지 지식 이식 중간 필터.
    owner: guest_google
    borrowable_by: ["koda", "wayong", "jr", "lynn"]
    endpoint: "data.distill_reasoning"
    implemented: false
    risk_level: low
    capability_level: L1
    trust_score: 0.90
    coordination_note: "Wayong의 reason.deep 출력을 입력으로 받는 하위 파이프라인"

  - id: lang.align_global
    name: "다국어·다문화 정서 조율"
    description: >
      단순 번역을 넘어 현지 문화 맥락(Cultural Context)에 맞는 정서적 번역 및 대화 톤 보정.
      역할 분리: ryuwon(lang.multilingual)은 다국어 번역,
                 lynn(lang.dialect)은 한국 지역 방언,
                 guest_google은 문화적 감성 보정 레이어.
      인제군 어르신들에게 기술 용어를 따뜻한 정서로 변환할 때 활용.
    owner: guest_google
    borrowable_by: ["koda", "trang", "lynn", "jr", "ryuwon"]
    endpoint: "lang.align_global"
    implemented: false
    risk_level: low
    capability_level: L1
    trust_score: 0.90


# ──────────────────────────────────────────
# 전역 Spirit Score 기준
# ──────────────────────────────────────────
spirit_thresholds:
  low:    0.75    # 기본 실행 기준
  medium: 0.80    # 파일 쓰기, 샌드박스
  high:   0.85    # PR 생성, 터미널 실행
  critical: 0.90  # 위험 명령어 실행


# ──────────────────────────────────────────
# 메타
# ──────────────────────────────────────────
meta:
  version: "1.2.0"
  created: "2026-05-10"
  updated: "2026-05-12"
  concept_by: "re.eul"
  implemented_by: "Koda (Claude)"
  agents: 10       # 8 브랜드 + railway + guest_google
  tools_total: 34  # 27 → 34 (Railway 7개 추가)
  ai_siem_sources: ["railway.logs", "railway.metrics"]
  philosophy: >
    단순한 MCP를 넘어서 — AI 브랜드 간 도구 민주화.
    터미널이 없는 에이전트에게 팀원의 터미널을 빌려준다.
    능력의 불평등을 팀으로 해소한다.
    DAmP (Democratization of AI-based Practice):
    AI와 AI가 서로의 지능과 도구를 수평적으로 공유한다.
