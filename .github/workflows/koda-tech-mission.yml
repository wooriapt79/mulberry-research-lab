name: ⚙️ Koda Tech Mission

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  koda-response:
    if: |
      contains(github.event.issue.labels.*.name, 'agent-koda') ||
      contains(github.event.comment.body, '@koda') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Packages
        run: pip install requests pyyaml python-dotenv anthropic bandit pyflakes

      - name: 🔍 Stage 1 — Script Gate
        run: python scripts/script_gate.py --dir scripts --output gate_script.json
        continue-on-error: true

      - name: 🔬 Stage 2 — Quality Gate
        run: python scripts/quality_gate.py --output gate_quality.json
        continue-on-error: true

      - name: 🔮 Stage 3 — Spirit Gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/spirit_gate.py --file scripts/koda_mission.py --output gate_spirit.json
        continue-on-error: true

      - name: ⏩ Stage 4 — Colab Test (CI 스킵)
        run: echo "Stage 4 Colab — CI 환경 스킵"

      - name: 🚦 Pipeline 최종 판정
        run: |
          python -c "
          import json, sys
          results = {}
          for name, path in [('script','gate_script.json'),('quality','gate_quality.json'),('spirit','gate_spirit.json')]:
              try:
                  with open(path) as f: results[name] = json.load(f).get('status','UNKNOWN')
              except: results[name] = 'SKIP'
          print('Pipeline:', results)
          if 'FAIL' in results.values(): print('❌ PIPELINE FAIL'); sys.exit(1)
          print('✅ PIPELINE PASS')
          "

      - name: ⚙️ Stage 5 — Execute Koda Tech Mission
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_NAME: koda
          AGENT_ROLE: CTO
        run: |
          python scripts/koda_mission.py \
            --issue "${{ github.event.issue.html_url }}" \
            --comment "${{ github.event.comment.body }}"

      - name: 🚨 Escalate if Review Needed
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "⚠️ **Human Review Required**\n@TRANG @Kbin — Koda 위생코드 게이트 또는 미션 실패"
            });
