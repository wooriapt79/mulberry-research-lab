name: 🤖 Baekya CodeGen Mission

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  baekya-response:
    if: |
      contains(github.event.issue.labels.*.name, 'agent-baekya') ||
      contains(github.event.comment.body, '@baekya') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Packages
        run: pip install requests pyyaml python-dotenv google-generativeai

      - name: 🤖 Execute Baekya CodeGen Mission
        id: baekya_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AGENT_NAME: baekya
          AGENT_ROLE: CODEGEN
        run: |
          python scripts/baekya_mission.py \
            --issue "${{ github.event.issue.html_url }}" \
            --comment "${{ github.event.comment.body }}"

      - name: 🚨 Escalate if Review Needed
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "⚠️ **Human Review Required**\n@TRANG @KODA — Baekya 코드생성 검토 요청"
            });
