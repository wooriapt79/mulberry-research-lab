name: 🏛️ Kbin Strategy Mission

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  kbin-response:
    if: |
      contains(github.event.issue.labels.*.name, 'agent-kbin') ||
      contains(github.event.comment.body, '@kbin') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Packages
        run: pip install requests pyyaml python-dotenv anthropic bandit pyflakes

      # ── 위생코드 5단계 파이프라인 ──────────────────────────

      - name: 🔍 Stage 1 — Script Gate (문법·구조 검증)
        id: script_gate
        run: python scripts/script_gate.py --dir scripts --output gate_script.json
        continue-on-error: true

      - name: 🔬 Stage 2 — Quality Gate (코드 품질)
        id: quality_gate
        run: python scripts/quality_gate.py --output gate_quality.json
        continue-on-error: true

      - name: 🔮 Stage 3 — Spirit Gate (윤리 검증)
        id: spirit_gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/spirit_gate.py --file scripts/kbin_mission.py --output gate_spirit.json
        continue-on-error: true

      - name: ⏩ Stage 4 — Colab Test (CI 스킵)
        run: echo "Stage 4 Colab — CI 환경 스킵"

      # ── 파이프라인 최종 판정 ────────────────────────────────

      - name: 🚦 Pipeline 최종 판정
        id: pipeline_check
        run: |
          python -c "
          import json, sys
          results = {}
          for name, path in [('script','gate_script.json'),('quality','gate_quality.json'),('spirit','gate_spirit.json')]:
              try:
                  with open(path) as f:
                      results[name] = json.load(f).get('status','UNKNOWN')
              except:
                  results[name] = 'SKIP'
          print('Pipeline:', results)
          if 'FAIL' in results.values():
              print('❌ PIPELINE FAIL')
              sys.exit(1)
          print('✅ PIPELINE PASS')
          "

      # ── Stage 5: Mission 실행 ───────────────────────────────

      - name: 🏛️ Stage 5 — Execute Kbin Strategy Mission
        id: kbin_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_NAME: kbin
          AGENT_ROLE: CSA
        run: |
          python scripts/kbin_mission.py \
            --issue "${{ github.event.issue.html_url }}" \
            --comment "${{ github.event.comment.body }}"

      - name: 🚨 Escalate if Review Needed
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "⚠️ **Human Review Required**\n@TRANG @KODA — Kbin 위생코드 게이트 또는 미션 실패"
            });
