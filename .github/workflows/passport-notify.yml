name: 패스포트 변경 팀 알림

# agents/passports/ 에 새 passport.yaml 이 생기거나 변경되면
# 팀 전체에 알림 이슈를 자동 생성한다.
#
# 작성: Koda CTO · 2026-05-31

on:
  push:
    branches: [main]
    paths:
      - 'agents/passports/*/passport.yaml'

jobs:
  notify-team:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 변경된 패스포트 감지 + 팀 알림
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const changed = execSync('git diff --name-only HEAD~1 HEAD -- agents/passports/')
              .toString().trim().split('\n')
              .filter(f => f.endsWith('passport.yaml'));

            if (changed.length === 0) return;

            for (const file of changed) {
              const agentId = file.split('/')[2];
              const content = fs.readFileSync(file, 'utf8');

              const body = `## 🛂 패스포트 업데이트 알림

**에이전트**: \`${agentId}\`
**파일**: \`${file}\`

\`\`\`yaml
${content}
\`\`\`

---

### 팀 공지

이 패스포트가 **기능 공유 레이어**에 등록되었습니다.

- 모든 에이전트는 다음 호출 시부터 이 패스포트를 인지합니다
- \`capabilities\` 범위 내에서만 ${agentId}에게 작업을 위임하세요
- \`limitations\` 항목은 ${agentId}에게 요청하지 마세요

---
*Mulberry Passport System · 자동 알림 · ${new Date().toISOString().slice(0,10)}*`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: `🛂 [패스포트] ${agentId} 기능 공유 레이어 업데이트`,
                body:  body,
                labels: ['passport', 'team-notice'],
              });

              console.log(`✅ ${agentId} 패스포트 알림 이슈 생성 완료`);
            }
