name: Post Issue Comment

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "댓글을 게시할 이슈 번호"
        required: true
        default: "24"
      comment_body:
        description: "게시할 댓글 내용"
        required: true
        default: "Mulberry Research Lab의 새로운 댓글입니다!"
      # 스크립트 경로는 변경하지 않고 기존 스크립트를 재활용합니다.
      script:
        description: "실행할 스크립트"
        required: false
        default: "scripts/post_issue24_comment.py"

permissions:
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Post Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 ${{ github.event.inputs.script }} \
            ${{ github.event.inputs.issue_number }} \
            "${{ github.event.inputs.comment_body }}"
