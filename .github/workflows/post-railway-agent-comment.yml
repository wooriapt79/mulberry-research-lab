name: 🚀 Post Railway Agent Comment to Issue #34

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  post-comment:
    name: Post Railway Agent Participation Comment
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📢 Post comment to Issue #34
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/gh_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${GH_REPO}/issues/34/comments" \
            --data-binary "$(python3 -c "import json; body=open('.github/workflows/railway-agent-comment.md').read(); print(json.dumps({'body': body}))")"
          )

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/gh_response.json

          if [ "$HTTP_STATUS" -eq 201 ]; then
            COMMENT_URL=$(python3 -c "import json; d=json.load(open('/tmp/gh_response.json')); print(d.get('html_url','N/A'))")
            echo "✅ 댓글이 성공적으로 게시되었습니다!"
            echo "🔗 댓글 URL: $COMMENT_URL"
          else
            echo "❌ 댓글 게시 실패 (HTTP $HTTP_STATUS)"
            exit 1
          fi
