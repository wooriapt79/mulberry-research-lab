name: Malu Agent Autonomous Action

on:
  issue_comment:
    types: [created]

jobs:
  malu_run:
    if: contains(github.event.comment.body, '@Malu-Agent')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-generativeai requests

      - name: Execute Malu Brain
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MALU_TOKEN: ${{ secrets.MALU_GITHUB_TOKEN }}
        run: |
          python .github/scripts/malu_processor.py
