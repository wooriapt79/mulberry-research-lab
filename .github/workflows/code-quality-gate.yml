name: Code Quality Gate — Mulberry v1.0

# Mulberry Research Lab — 코드 품질 게이트
# Phase 1: Python 내부 코드 자동 검증
# 트리거: PR 생성·업데이트 시 자동 실행
#
# 작성: Koda CTO · 2026-05-27

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: '검사 대상 파일 또는 폴더'
        required: false
        default: '.'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Quality Gate Tools
        run: |
          pip install bandit radon pyflakes

      - name: 변경된 Python 파일 목록
        if: github.event_name == 'pull_request'
        run: |
          BASE_REF="${{ github.base_ref }}"
          BASE_REF="${BASE_REF:-main}"
          git diff --name-only --diff-filter=ACMR \
            "origin/$BASE_REF...HEAD" -- '*.py' > changed_files.txt
          cat changed_files.txt

      - name: Run Code Quality Gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python .github/scripts/quality_gate/run_gate.py --files-from changed_files.txt
          else
            TARGET="${{ github.event.inputs.target || '.' }}"
            python .github/scripts/quality_gate/run_gate.py "$TARGET"
          fi
        continue-on-error: true

      - name: Post Quality Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'quality_report.md');
            if (!fs.existsSync(reportPath)) {
              console.log('quality_report.md 없음 — 스킵');
              return;
            }
            const body = fs.readFileSync(reportPath, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            console.log('✅ 댓글 게시 완료');

      - name: Gate 판정 결과 확인
        run: |
          if [ -f gate_result.json ]; then
            VERDICT=$(python -c "import json; print(json.load(open('gate_result.json'))['verdict'])")
            echo "최종 판정: $VERDICT"
            if [ "$VERDICT" = "BLOCK" ]; then
              echo "❌ BLOCK — PR 머지 불가"
              exit 1
            fi
          fi
