name: Code Quality Gate — Mulberry v1.0

# Mulberry Research Lab — 코드 품질 게이트
# Phase 1: Python 내부 코드 자동 검증
# 트리거: PR 생성·업데이트 시 자동 실행
#
# 작성: Koda CTO · 2026-05-27

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: '검사 대상 파일 또는 폴더'
        required: false
        default: '.'

jobs:
  quality-gate:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-quality-gate')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Quality Gate Tools
        run: |
          pip install bandit radon pyflakes

      - name: Detect Changed Python Files
        id: changed
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' \
            | grep -v '\.github/scripts/quality_gate/' \
            | tr '\n' ' ' | xargs)
          echo "감지된 py 파일: '$FILES'"
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run Code Quality Gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET="${{ steps.changed.outputs.files }}"
            if [ -z "$TARGET" ]; then
              echo "변경된 Python 파일 없음 — PASS 처리"
              echo '{"verdict":"PASS","target":"none","checks":{},"blocks":[],"warnings":[]}' > gate_result.json
              printf '## ✅ Mulberry Code Quality Gate — PASS\n\n**판정**: PASS  \n변경된 Python 파일 없음 — 검사 스킵\n' > quality_report.md
              exit 0
            fi
          else
            TARGET="${{ github.event.inputs.target || '.' }}"
          fi
          echo "검사 대상: $TARGET"
          python .github/scripts/quality_gate/run_gate.py $TARGET
        continue-on-error: true

      - name: Post Quality Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'quality_report.md');
            if (!fs.existsSync(reportPath)) {
              console.log('quality_report.md 없음 — 스킵');
              return;
            }
            const body = fs.readFileSync(reportPath, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            console.log('✅ 댓글 게시 완료');

      - name: Gate 판정 결과 확인
        continue-on-error: true
        run: |
          if [ -f gate_result.json ]; then
            VERDICT=$(python -c "import json; print(json.load(open('gate_result.json'))['verdict'])")
            echo "최종 판정: $VERDICT"
            if [ "$VERDICT" = "BLOCK" ]; then
              echo "❌ BLOCK — 리포트 확인 후 대표님이 최종 결정"
              exit 1
            fi
          fi
