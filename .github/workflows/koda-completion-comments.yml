### 구현 완료 내용

#### 1. 표준 스키마 v2.0 정의
**파일**: \`config/tool_registry/schema_v2.yaml\`

v2 신규 필드 전체 명세:
| 필드 | 타입 | 비고 |
|------|------|------|
| \`model\` | string | 실행 AI 모델 (claude/gemini/deepseek/gpt-4o 등) |
| \`status\` | string | active / planned / deprecated |
| \`version\` | string | SemVer (예: 1.0.0) |
| \`input_format\` | list | text/image/file/json 등 |
| \`output_format\` | list | text/json/file/url 등 |
| \`permission_level\` | string | public / team / restricted |

#### 2. 유효성 검증기
**파일**: \`scripts/validate_registry.py\`

\`\`\`bash
python scripts/validate_registry.py          # 기본 검증
python scripts/validate_registry.py --strict  # CI 엄격 모드
python scripts/validate_registry.py --fix     # 자동 보정
\`\`\`

#### 3. 전체 34개 도구 마이그레이션

| 에이전트 | 모델 | Active | Planned |
|----------|------|--------|---------|
| Koda | claude-sonnet-4-5 | 6 | 0 |
| Malu | gemini-1.5-flash/pro | 2 | 0 |
| Wayong | deepseek-r1 | 2 | 1 |
| Railway | railway-api | 4 | 3 |
| Kbin/RyuWon/Lynn/Jr/Trang/google | 각 모델 | 0 | 14 |

**검증 결과**: ERROR 0건 / WARNING 0건 ✅

