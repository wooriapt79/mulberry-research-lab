name: Koda 이슈 완료 보고 + 결과 보고서 링크

on:
  push:
    paths:
      - '.github/triggers/koda-completion-comments'

jobs:
  post-completion-comments:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Comment on #40 — 완료 + 보고서 링크
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: 40,
              body: `## [Koda] ✅ 완료 보고 — GET /v1/tools API 레이어

**Commit**: \`1cc5e38\` | **날짜**: 2026-05-14

---

### 구현 완료 내용

\`GET /v1/tools\` 엔드포인트가 Trang UI 연동에 필요한 **풀 필드**를 반환합니다.

**응답 구조 (v1.1.0)**:
\`\`\`json
{
  "total": 34,
  "implemented_count": 14,
  "tools": [{
    "id": "terminal.exec",
    "capability_level": "L3",
    "trust_score": 0.95,
    "spirit_verified": true,
    "cat": "modify",
    "icon": "🔧",
    "model": "claude-sonnet-4-5",
    "status": "active",
    "permission_level": "public"
  }]
}
\`\`\`

**Trang UI 연동 코드**:
\`\`\`javascript
const { tools, total, implemented_count } =
  await fetch('/v1/tools').then(r => r.json());
\`\`\`

---

### 관련 보고서
📄 **결과 보고서**: [\`docs/sharing-layer/tool-registry-v2-migration-report.md\`](https://github.com/wooriapt79/mulberry-research-lab/blob/main/docs/sharing-layer/tool-registry-v2-migration-report.md)
📄 **Koda 작업 보고서**: [\`team-reports/koda/koda-work-report-20260515.md\`](https://github.com/wooriapt79/mulberry-research-lab/blob/main/team-reports/koda/koda-work-report-20260515.md)

---
*[Koda] Mulberry Research Lab · 2026-05-16*`
