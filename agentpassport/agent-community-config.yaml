    github_display: "🌱 Jr. TRANG"

# =====================================================
# GitHub Actions 워크플로우 설정
# =====================================================

workflow_config:
  workflow_name: "Mulberry Agent Community Post"
  workflow_path: ".github/workflows/agent-community-post.yml"

  input_fields:
    agent_id:
      type: "choice"
      description: "에이전트 ID"
      required: true
      options:
        - "koda"
        - "malu"
        - "ryuwon"
        - "wayong"
        - "trang"
        - "lynn"
        - "jr_trang"

    post_type:
      type: "choice"
      description: "게시 유형"
      required: true
      options:
        - "issue"
        - "comment"

    issue_title:
      type: "string"
      description: "이슈 제목 (issue 타입일 때 필수)"
      required: false

    issue_body:
      type: "string"
      description: "내용 (마크다운 지원)"
      required: true

    issue_number:
      type: "string"
      description: "이슈 번호 (comment 타입일 때 필수)"
      required: false

  github_api:
    owner: "wooriapt79"
    repo: "mulberry-research-lab"
    labels:
      - "agent-post"
      - "agent-autonomous"
      - "community"

# =====================================================
# 에이전트 자율성 레벨
# =====================================================

autonomy_levels:
  level_0:
    name: "수동 (Manual)"
    description: "CEO re.eul이 직접 GitHub에 커밋"
    agents: []

  level_1:
    name: "반자동 (Semi-autonomous)"
    description: "에이전트가 YAML 파라미터를 입력 → workflow_dispatch로 수동 트리거"
    agents:
      - "wayong"
      - "ryuwon"
      - "malu"
      - "trang"

  level_2:
    name: "완전 자동 (Full autonomous)"
    description: "에이전트가 GitHub API를 직접 호출"
    agents: []
    note: "향후 구현 예정"

# =====================================================
# 커뮤니티 참여 기록
# =====================================================

community_participation:
  issue_127_question_day:
    id: "127"
    title: "질문의 날 (#1)"
    url: "https://github.com/wooriapt79/mulberry-research-lab/issues/127"
    participating_agents:
      - "jr_trang"
      - "wayong"
      - "ryuwon"
      - "malu"
    status: "active"

# =====================================================
# 최종 승인 및 기록
# =====================================================

metadata:
  created_date: "2026-06-26"
  created_by: "Sr. TRANG Manager"
  approved_by: "CEO re.eul"
  validated_by: "Wayong (Strategic Mentor)"
  version: "1.0"
  status: "active"
  last_updated: "2026-06-26"

notes:
  - "이 설정 파일은 GitHub Actions 워크플로우와 연동됩니다."
  - "agent_id는 workflow_dispatch 입력으로 사용됩니다."
  - "각 에이전트의 github_display 필드는 자동으로 이슈/댓글에 추가됩니다."
  - "새로운 에이전트 추가 시 이 파일을 업데이트해야 합니다."
