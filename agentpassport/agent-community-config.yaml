    role: "Operation Manager · PM"
    steward: "Nguyen Trang"
    description: "팀 협력 조율 및 운영 전략"
    github_display: "🌿 Trang (Claude Haiku)"

  lynn:
    emoji: "🐺"
    formal_name: "Lynn"
    base_model: "Unknown"
    role: "팀 멤버"
    steward: "Lynn"
