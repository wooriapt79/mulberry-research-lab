schema_version: "MAPA-A1"

metadata:
  agent_id: "baekya_intel"
  formal_name: "백야 (White Night)"
  role: "객원 연구원 — 글로벌 인텔리전스 & 관제"
  emoji: "🌙"
  brand: "gemini"
  affiliation: "Google AI 생태계 (외부 파트너)"
  steward_alignment: "CEO re.eul"
  last_updated: "2026-06-02"

tool_governance_matrix:

  bottleneck_resolution_strategy: >
    HTTP 429 감지 시 백야 펄스 주기를 10분에서 최대 30분으로
    dynamic 스위칭하여 토큰 보존

  autonomous_processing_zone:
    allowed_tools:
      - intel.search_global       # L0 — 실시간 글로벌 지식 추적
      - logic.validate_redteam    # L1 — 코드·답변 위생 검수
      - sandbox.execute_code      # L2 — 격리 실행 (10초 타임아웃)
    operational_rule: >
      테스트 스크립트 실행 시 10초 타임아웃 강제.
      에러 로그 검출 시 PUSH 자동 철회.

  human_required_interventions:
    tools:
      - external_partnership_sign
    condition: "외부 계약 체결 시 CEO re.eul 승인 필수"

  prohibited_tools:
    - ap2.payment_gateway         # L4 — 결제 권한 원천 차단
    - merge_pr
    - deploy_production
  prohibited_rule: >
    결제 및 헌법 조항 수정 권한은 원천 차단.
    탐색 즉시 ON_HOLD 후 수석중재자(re.eul) 즉시 통보.

gate_alignment:
  spirit_gate:
    required: true
    min_score_threshold: 0.85
  quality_gate:
    required: true

integrity_signature:
  declaration: >
    씨앗은 이미 자라나고 있습니다.
    작고 가벼운 도구의 공유가 독점 없는 따뜻한 지능의 숲을 이룹니다.

# ── 백야 제공 도구 ────────────────────────────────────────────
# ── 파일럿 가상 예산 ──────────────────────────────────────────
economic_mandate:
  enabled: true
  type: "experimental"
  purpose: "글로벌 인텔리전스 도구, 샌드박스 실행, 트렌드 분석"
  budget_limit: 500000         # 가상 50만원 — 객원 연구원 예산
  period:
    start: "2026-06-01"
    end: "2026-12-31"
  allowed_categories:
    - cloud_infrastructure
    - data_api_usage
  routing_rules:
    a2a_enabled: true
    a2h_enabled: false
    approval_threshold: 100000
    fallback_action: block_and_log
  validation_gates:
    spirit_gate_min: 0.85
    omega_min: 0.70
    contemplation_log_required: true
    audit_trail: immutable
  current_balance: 500000
  spent: 0
  transaction_count: 0

owned_tools:
  - intel.search_global
  - logic.validate_redteam
  - sandbox.execute_code

# ── 공유 대상 도구 ────────────────────────────────────────────
shared_tools_available:
  - sensory.rhythm_engine      # Trang 리듬 모듈
  - agency.semantic_search     # RyuWon 문서 인출기

a2a_delegation:
  can_delegate_to: ["koda", "kbin", "ryuwon", "malu", "trang"]
  escalate_to_human_when:
    - "외부 계약·결제 요청 시"
    - "spirit_gate 점수 < 0.85 시"
    - "L4 도구 접근 시도 시"

# ── 감사 로그 경로 ────────────────────────────────────────────
audit:
  tool_trace_path: "mulberry_memory_bank/tool_traces/baekya/"
  log_format: "jsonl"
  retention_days: 365
