version: "1.0.0"

# ──────────────────────────────────────────────
# Mulberry DNA — 모든 프로젝트의 기본 설정
# config_agent가 어떤 서버든 이 DNA로 초기화
# ──────────────────────────────────────────────

identity:
  brand: "Mulberry"
  spirit: "jangseungbaegi"          # 장승배기 정신 — 사람을 위한 기술
  principle: "AI serves humans"
  coding_team: "Koda Coding Team"

# ── 배포 전략 ───────────────────────────────
deployment:
  primary: railway
  fallback: vercel
  static_fallback: github_pages
  auto_deploy: true
  eta_minutes: 5                    # 고객이 URL 받기까지 목표 시간

  targets:
    railway:
      region: "asia-pacific"
      start_command: "python main.py"
      health_check: "/"
    vercel:
      framework: "vanilla"
      build_command: null
    github_pages:
      branch: "gh-pages"
      folder: "."

# ── Mulberry 코딩 DNA ───────────────────────
dna:
  backend_language: python
  frontend_style: vanilla-js        # 가볍고 빠르게
  ui_philosophy: "보여주는 것이 설득이다"
  ethics_gate: true                 # 코드 품질 게이트 필수
  team_signature: true              # 팀원 이름이 코드에 남는다

  code_standards:
    indent: 4
    encoding: utf-8
    comments: korean
    naming: snake_case

# ── 자동 생성 워크스페이스 구조 ─────────────
workspace:
  required_dirs:
    - docs
    - src
    - tests
  required_files:
    - README.md
    - .gitignore
    - requirements.txt

  auto_create:                      # 없으면 자동 생성
    - README.md
    - .gitignore
    - requirements.txt
    - Procfile                      # Railway 배포용

# ── 고객 결과물 설정 ────────────────────────
customer_output:
  format: live_url                  # 고객이 받는 것: URL
  notify_channel: github_issue      # 완료 알림 방식
  show_progress: true               # 진행 상황 실시간 표시
  include_source: false             # 고객에게 소스 노출 안 함

# ── PM 에스컬레이션 ─────────────────────────
pm_escalation:
  enabled: true
  channel: github_issue
  escalate_on:
    - new_deployment_target
    - database_change
    - security_configuration
    - cost_threshold_exceeded
  question_template: "[ConfigAgent → Trang] {event}: {detail}\n승인 / 보류 / 롤백"

# ── 변경 감지 ───────────────────────────────
change_watch:
  triggers:
    - deployment_target_changed
    - language_stack_changed
    - database_tool_changed
    - new_external_api_added
  action: pause_and_ask_pm

mode:
  current: "dev"
  dev:
    auto_push: true
    fallback_zip: true
    require_pm_approval_for_env_change: true
  prod:
    auto_push: false
    require_pm_approval_for_env_change: true
