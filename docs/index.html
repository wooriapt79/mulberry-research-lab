<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mulberry Lab · Aria Guide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="aria-portal">
    <div class="avatar">🎵</div>
    <h1>Aria (아리아) 와의 대화</h1>
    <p class="subtitle">Mulberry Research Lab 의 자율 가이드입니다.<br>궁금한 점을 입력하시면 연구소 기록으로 안전하게 전달됩니다.</p>
    <div class="chat-box">
      <input type="text" id="userInput" placeholder="예: 기여 방법, 기술 문의, 거버넌스 질문..." maxlength="200">
      <button id="sendBtn">전송</button>
    </div>
    <div id="status" class="status"></div>
    <footer>One Team. One Flow. One Spirit. 🌊</footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
