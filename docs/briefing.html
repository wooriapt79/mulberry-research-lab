<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mulberry Research Lab — 브리핑 룸</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card2: #1a1a26;
    --accent: #7c5cfc;
    --accent2: #4ecca3;
    --text: #e8e8f0;
    --muted: #8888aa;
    --border: rgba(124,92,252,0.2);
    --malu: #c084fc;
    --malu-border: rgba(192,132,252,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── VILLAGE HERO IMAGE ── */
  .village-hero {
    width: 100%;
    position: relative;
    overflow: hidden;
    line-height: 0;
  }
  .village-hero img {
    width: 100%;
    height: auto;
    max-height: 400px;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }
  .village-hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to bottom, transparent, var(--bg));
    pointer-events: none;
  }

  /* ── PAGE NAV ── */
  .page-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px 24px 0;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .page-nav a {
    padding: 8px 20px;
    border-radius: 8px 8px 0 0;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    border: 1px solid transparent;
    border-bottom: none;
  }
  .page-nav a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .page-nav a.active {
    color: var(--malu);
    background: var(--bg);
    border-color: var(--malu-border);
  }

  /* ── HERO ── */
  .hero {
    background:
      linear-gradient(160deg,
        rgba(13,13,26,0.82) 0%,
        rgba(26,10,46,0.75) 50%,
        rgba(10,26,26,0.82) 100%),
      url('assets/mulberry-lab-hero.png') center/cover no-repeat;
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .agent-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(192,132,252,0.12);
    border: 1px solid var(--malu-border);
    color: var(--malu);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }
  .hero .desc {
    color: var(--muted);
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── TOPIC BUTTONS ── */
  .topic-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 20px 16px 0;
  }
  .cat-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cat-btn:hover { border-color: var(--malu-border); color: var(--text); }
  .cat-btn.active {
    background: rgba(192,132,252,0.15);
    border-color: var(--malu-border);
    color: var(--malu);
    font-weight: 600;
  }

  /* ── CHAT HISTORY ── */
  #chatHistory {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 200px;
    max-height: 400px;
    overflow-y: auto;
  }
  .chat-msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .chat-msg.user { flex-direction: row-reverse; }
  .chat-avatar {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .chat-bubble {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    max-width: 82%;
    font-size: 14px;
    line-height: 1.6;
  }
  .chat-msg.user .chat-bubble {
    background: rgba(124,92,252,0.15);
    border-color: rgba(124,92,252,0.3);
    text-align: right;
  }
  .chat-bubble.loading { color: var(--muted); font-style: italic; }
  .chat-bubble p { margin: 0 0 6px; }
  .chat-bubble p:last-child { margin-bottom: 0; }
  .chat-bubble strong { color: var(--malu); }
  .chat-bubble code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }
  .chat-bubble table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 13px;
  }
  .chat-bubble th, .chat-bubble td {
    border: 1px solid var(--border);
    padding: 4px 8px;
    text-align: left;
  }
  .chat-bubble th { background: rgba(192,132,252,0.1); color: var(--malu); }

  /* ── INPUT AREA ── */
  .input-section {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 24px;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #briefingInput {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  #briefingInput:focus {
    outline: none;
    border-color: var(--malu-border);
  }
  #briefingInput::placeholder { color: var(--muted); }
  #briefingBtn {
    padding: 10px 18px;
    background: rgba(192,132,252,0.2);
    border: 1px solid var(--malu-border);
    border-radius: 12px;
    color: var(--malu);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #briefingBtn:hover { background: rgba(192,132,252,0.3); }
  #briefingBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    padding: 0 2px;
  }
  #briefingCharCount {
    font-size: 12px;
    color: var(--muted);
  }
  #briefingCharCount.warn { color: #f7b731; }
  #briefingCharCount.over { color: #fc5c5c; }
  #saveBtn {
    display: none;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #saveBtn:hover { border-color: var(--malu-border); color: var(--malu); }
</style>
</head>
<body>

<!-- BRIEFING ROOM HERO -->
<div class="village-hero">
  <img src="briefing-hero.png" alt="Mulberry Research Lab — 브리핑 룸">
</div>

<!-- PAGE NAV -->
<nav class="page-nav">
  <a href="index.html">💬 일반 문의</a>
  <a href="briefing.html" class="active">🏛️ 브리핑 룸</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="agent-badge" aria-label="agent-badge">브리핑 룸 · Repo-RAG · Malu 연구소장 🌺</div>
  <h1>Mulberry Research Lab 브리핑 룸</h1>
  <p class="desc">Malu 연구소장이 직접 응대합니다.<br>방문자 누구에게나 동등하게 — 실시간 레포 기반 브리핑.</p>
</div>

<!-- TOPIC BUTTONS -->
<div class="topic-row">
  <button class="cat-btn active" data-topic="general">🔍 전체</button>
  <button class="cat-btn" data-topic="tech">⚙️ 기술</button>
  <button class="cat-btn" data-topic="vision">🌿 비전</button>
  <button class="cat-btn" data-topic="governance">📋 거버넌스</button>
</div>

<!-- CHAT HISTORY -->
<div id="chatHistory"></div>

<!-- INPUT AREA -->
<div class="input-section">
  <div class="input-row">
    <textarea id="briefingInput" rows="1" maxlength="500"
      placeholder="Mulberry Research Lab에 대해 궁금한 것을 물어보세요..."></textarea>
    <button id="briefingBtn">브리핑 요청 →</button>
  </div>
  <div class="input-meta">
    <span id="briefingCharCount">0 / 500</span>
    <button id="saveBtn">📥 대화 저장</button>
  </div>
</div>

<script src="briefing.js"></script>
</body>
</html>
